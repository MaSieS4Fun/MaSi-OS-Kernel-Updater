# kernel-new-base — build defaults (standalone; copy to config/local.conf to override)

KERNEL_CDN="https://cdn.kernel.org/pub/linux/kernel"
ARMBIAN_PATCH_RAW="https://github.com/armbian/build/raw/main"

KERNEL_LOCALVERSION="-edge-sm8550"
OUTPUT_SUFFIX="${OUTPUT_SUFFIX:-kbase}"
# OUTPUT_DIR, CACHE_DIR, PATCH_CACHE — resolved in lib/kbuild.sh

JOBS="${JOBS:-$(nproc)}"
# strict = abort on any patch failure; tolerant = continue (not recommended)
PATCH_POLICY="${PATCH_POLICY:-strict}"
PATCH_SKIP="${PATCH_SKIP:-}"

# all = auto (Armbian edge series, e.g. 7.0.x)
KERNEL_VER="${KERNEL_VER:-}"
KERNEL_SERIES="${KERNEL_SERIES:-}"
# 0 = skip kernel recompile (reuse output/.build/<release>-masi/ + existing modules/)
BUILD_COMPILE="${BUILD_COMPILE:-1}"
FALLBACK_KERNEL_VERSIONS="${FALLBACK_KERNEL_VERSIONS:-7.0.14 7.0.13 7.0.12 7.0.11 6.18.37 6.18.36 6.18.35 6.18.8}"
KERNEL_VERSIONS_PER_SERIES="${KERNEL_VERSIONS_PER_SERIES:-8}"

GAMING_TUNING="${GAMING_TUNING:-1}"
# schedutil = factory-like (matches working 6.18.8); performance = force max cpufreq
CPUFREQ_GOVERNOR="${CPUFREQ_GOVERNOR:-schedutil}"
# 0 = LinuxLoader 6.18.8 cmdline; 1 = add psi=0 arm64.nopauth efi=noruntime video=efifb:off
ABL_CMDLINE_EXTRAS="${ABL_CMDLINE_EXTRAS:-0}"
# 1 = diagnostic build: initramfs writes /boot/masi-boot.log (see docs/DEBUG-BOOTLOG.md)
DEBUG_BOOTLOG="${DEBUG_BOOTLOG:-0}"
# Repack boot/KERNEL with this microSD root UUID (dual-boot SD + UFS).
INSTALL_REPACK_KERNEL="${INSTALL_REPACK_KERNEL:-1}"
# 1 = refuse install if UUID repack fails (never ship builder KERNEL to another SD)
INSTALL_STRICT="${INSTALL_STRICT:-1}"
# GPT PARTLABEL for Linux root (microSD + UFS STORAGE partition)
INTERNAL_ROOT_PARTLABEL="${INTERNAL_ROOT_PARTLABEL:-STORAGE}"
AYN_FAMILY_DRIVERS="${AYN_FAMILY_DRIVERS:-1}"
# Deep suspend (ROCKNIX PR #2952 UFS patches). 0 = skip fetch/apply/verify.
SUSPEND_DEEP_PATCHES="${SUSPEND_DEEP_PATCHES:-1}"
# 1 = mem_sleep_default=deep + UFS UIC timeout on kernel cmdline (see docs/SUSPEND.md)
SUSPEND_DEEP="${SUSPEND_DEEP:-1}"

# Public sources only (see README). Optional: FIRMWARE_SOURCE=host, INITRAMFS_PROFILE=gold
BOOTIMG_TEMPLATE="${BOOTIMG_TEMPLATE:-}"

# all = every DTB in config/devices.conf + dtb-chain.map
DEVICE_TARGET="${DEVICE_TARGET:-all}"

BUILD_ZIMAGE="${BUILD_ZIMAGE:-1}"
BUILD_INITRD="${BUILD_INITRD:-1}"
BUILD_BOOTIMG="${BUILD_BOOTIMG:-1}"
FIRMWARE_IN_INITRD="${FIRMWARE_IN_INITRD:-none}"
FIRMWARE_SOURCE="${FIRMWARE_SOURCE:-download}"
FIRMWARE_GIT_URL="${FIRMWARE_GIT_URL:-https://github.com/armbian/firmware.git}"
FIRMWARE_GIT_REF="${FIRMWARE_GIT_REF:-master}"
BOOT_LINUXLOADER_CFG_PATH="${BOOT_LINUXLOADER_CFG_PATH:-/boot/LinuxLoader.cfg}"
BOOT_KERNEL_PATH="${BOOT_KERNEL_PATH:-/boot/KERNEL}"
BOOTIMG_MAX_BYTES="${BOOTIMG_MAX_BYTES:-201326592}"

# Manual UUID override (usually not needed — read from LinuxLoader.cfg, then KERNEL)
ROOT_UUID="${ROOT_UUID:-}"
# efi-clean = minimal mkinitramfs (always scrubbed). Gold reuse off by default — it broke multi-device boot.
INITRAMFS_PROFILE="${INITRAMFS_PROFILE:-efi-clean}"
INITRAMFS_USE_GOLD="${INITRAMFS_USE_GOLD:-0}"
INITRD_MAX_MB="${INITRD_MAX_MB:-150}"
GOLD_INITRD_REF="${GOLD_INITRD_REF:-}"
DTB_STRATEGY="${DTB_STRATEGY:-reference-chain-order}"

kernel_major_minor() {
    local ver="$1"
    echo "${ver%.*}"
}

resolve_kernel_config() {
    if [[ -n "${KERNEL_CONFIG:-}" && -f "${KERNEL_CONFIG}" ]]; then
        echo "${KERNEL_CONFIG}"
        return 0
    fi
    if [[ -f "${ROOT}/config/golden.config" ]]; then
        echo "${ROOT}/config/golden.config"
        return 0
    fi
    echo "WARNING: no config/golden.config — using Armbian defconfig." >&2
    fetch_armbian_defconfig
}

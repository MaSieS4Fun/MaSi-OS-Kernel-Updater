# Kernel_MaSi-OS — build defaults
# Copy to config/local.conf for local overrides only.

KERNEL_CDN="https://cdn.kernel.org/pub/linux/kernel"
ARMBIAN_PATCH_RAW="https://github.com/armbian/build/raw/main"

KERNEL_LOCALVERSION="-edge-sm8550"
OUTPUT_SUFFIX="${OUTPUT_SUFFIX:-masi}"
# OUTPUT_DIR, CACHE_DIR, PATCH_CACHE — resolved in lib/kbuild.sh

JOBS="${JOBS:-$(nproc)}"
PATCH_POLICY="${PATCH_POLICY:-strict}"
PATCH_SKIP="${PATCH_SKIP:-}"

# all = auto (Armbian edge series, e.g. 7.0.x)
KERNEL_VER="${KERNEL_VER:-}"
KERNEL_SERIES="${KERNEL_SERIES:-}"
# 0 = skip kernel recompile (reuse output/.build/<release>-masi/ + existing modules/)
BUILD_COMPILE="${BUILD_COMPILE:-1}"
FALLBACK_KERNEL_VERSIONS="${FALLBACK_KERNEL_VERSIONS:-7.0.14 7.0.13 7.0.12 7.0.11 6.18.37 6.18.36 6.18.35 6.18.8}"
KERNEL_VERSIONS_PER_SERIES="${KERNEL_VERSIONS_PER_SERIES:-8}"

GAMING_TUNING="${GAMING_TUNING:-1}"
AYN_FAMILY_DRIVERS="${AYN_FAMILY_DRIVERS:-1}"

# all = every DTB in config/devices.conf
DEVICE_TARGET="${DEVICE_TARGET:-all}"

BUILD_ZIMAGE="${BUILD_ZIMAGE:-1}"
BUILD_INITRD="${BUILD_INITRD:-1}"
BUILD_BOOTIMG="${BUILD_BOOTIMG:-1}"
FIRMWARE_IN_INITRD="${FIRMWARE_IN_INITRD:-minimal}"
BOOT_LINUXLOADER_CFG_PATH="${BOOT_LINUXLOADER_CFG_PATH:-/boot/LinuxLoader.cfg}"
BOOT_KERNEL_PATH="${BOOT_KERNEL_PATH:-/boot/KERNEL}"
BOOTIMG_MAX_BYTES="${BOOTIMG_MAX_BYTES:-82536448}"

# Manual UUID override (usually not needed — read from LinuxLoader.cfg, then KERNEL)
ROOT_UUID="${ROOT_UUID:-}"
# gold = reference EFI initrd (~47 MB, fits ABL bootimg); efi-clean = minimal mkinitramfs
INITRAMFS_PROFILE="${INITRAMFS_PROFILE:-gold}"
GOLD_INITRD_REF="${GOLD_INITRD_REF:-}"
DTB_STRATEGY="${DTB_STRATEGY:-rocknix-chain-order}"

# ROCKNIX reference for base/RP6 slots (only if device-tree/vendored/ is missing)
# ROCKNIX_KERNEL="${ROOT}/../Kernel-odin2/rocknix-boot-partition/KERNEL"

kernel_major_minor() {
    local ver="$1"
    echo "${ver%.*}"
}

resolve_kernel_config() {
    if [[ -n "${KERNEL_CONFIG:-}" && -f "${KERNEL_CONFIG}" ]]; then
        echo "${KERNEL_CONFIG}"
        return 0
    fi
    if [[ -f "${ROOT}/config/golden.config" ]]; then
        echo "${ROOT}/config/golden.config"
        return 0
    fi
    echo "WARNING: no config/golden.config — using Armbian defconfig." >&2
    fetch_armbian_defconfig
}

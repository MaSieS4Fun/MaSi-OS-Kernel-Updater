# Qualcomm SM8550 ABL bootimg layout (in-repo spec).
# Cmdline is set at pack time — not copied from any installed image.
# SM8550 ABL bootimg — 192 MiB bootsize (ARMADA-class ~177 MB KERNEL fits).
bootsize = 201326592
pagesize = 2048
kerneladdr = 0x10008000
ramdiskaddr = 0x16000000
tagsaddr = 0x10000100
name =
